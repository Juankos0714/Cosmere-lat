<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmere — Atlas Estelar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <!-- Three.js -->
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #020408;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #cosmos-canvas {
      display: block;
      width: 100vw; height: 100vh;
      position: fixed; inset: 0;
      z-index: 0;
    }

    #ui-root {
      position: fixed; inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    #ui-root > * { pointer-events: auto; }

    /* Scrollbar for book rail */
    ::-webkit-scrollbar { height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(100,140,200,0.25); border-radius: 2px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px) translateX(var(--tx, 0)); }
      to   { opacity: 1; transform: translateY(0) translateX(var(--tx, 0)); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-6px); }
    }

    @keyframes load {
      from { width: 0; }
      to   { width: 100%; }
    }

    @keyframes ringPulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
      50%       { transform: translate(-50%,-50%) scale(1.35); opacity: 0.5; }
    }

    /* Glow vignette at edges */
    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 55%, #010306 100%);
      z-index: 5;
    }
  </style>
</head>
<body>

  <canvas id="cosmos-canvas"></canvas>
  <div id="ui-root"></div>

  <!-- Data -->
  <script src="data.js?v=5"></script>

  <!-- Three.js scene -->
  <script src="scene.js?v=5"></script>

  <!-- React UI -->
  <script type="text/babel" src="App.jsx?v=5"></script>

</body>
</html>
