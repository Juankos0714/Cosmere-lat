<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#c8a855" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#010306" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a855" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c8a855" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="#020408"/>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="45"  cy="30"  r="0.8" fill="white" opacity="0.6"/>
  <circle cx="120" cy="55"  r="0.6" fill="white" opacity="0.4"/>
  <circle cx="300" cy="25"  r="1.0" fill="white" opacity="0.7"/>
  <circle cx="360" cy="80"  r="0.7" fill="white" opacity="0.5"/>
  <circle cx="80"  cy="200" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="340" cy="220" r="0.6" fill="white" opacity="0.6"/>
  <circle cx="200" cy="15"  r="0.8" fill="white" opacity="0.5"/>
  <circle cx="250" cy="260" r="0.7" fill="white" opacity="0.4"/>
  <!-- Central glow -->
  <circle cx="200" cy="130" r="80" fill="url(#glow)"/>
  <!-- Symbol silhouette -->
  <text x="200" y="145" text-anchor="middle" font-size="48" fill="#c8a855" opacity="0.25" font-family="serif">✦</text>
  <!-- Name label -->
  <text x="200" y="220" text-anchor="middle" font-size="16" fill="#c8a855" opacity="0.9" font-family="'Cinzel', Georgia, serif" letter-spacing="3">Kelsier</text>
  <!-- Border accent -->
  <rect x="1" y="1" width="398" height="298" fill="none" stroke="#c8a855" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="#c8a855" stroke-opacity="0.08" stroke-width="1"/>
</svg>
