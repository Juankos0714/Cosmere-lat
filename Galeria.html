  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;min-height:100%;background:#010306;color:#e0d8c8;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(100,140,200,.2);border-radius:3px;}

    /* Curvas globales para todos los elementos interactivos */
    a, button, input { transition: color .25s ease, background .25s ease, border-color .25s ease, transform .25s cubic-bezier(.22,1,.36,1), box-shadow .3s ease, opacity .25s ease; }
    img { will-change: transform; }

    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    @keyframes spinReverse{from{transform:rotate(360deg);}to{transform:rotate(0deg);}}
    @keyframes orbit{from{transform:rotate(0deg) translateX(var(--orbit-r,80px)) rotate(0deg);}to{transform:rotate(360deg) translateX(var(--orbit-r,80px)) rotate(-360deg);}}
    @keyframes planetSpin{from{background-position:0% 0;}to{background-position:200% 0;}}
    @keyframes twinkle{0%,100%{opacity:.3;}50%{opacity:1;}}
    @keyframes drift{0%{transform:translateX(-50%);}100%{transform:translateX(50%);}}
    @keyframes fadeUp{
      0%{opacity:0;transform:translateY(20px) scale(.985);filter:blur(2px);}
      60%{opacity:1;filter:blur(0);}
      100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}
    }
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    /* Failsafe: ensure cards are visible even if animation is suppressed by reduced-motion or any other reason */
    .card-anim { opacity: 1; }
    @keyframes fadeInScale{
      from{opacity:0;transform:scale(.96);}
      to{opacity:1;transform:scale(1);}
    }
    @keyframes modalIn{
      0%{opacity:0;transform:translateY(28px) scale(.94);filter:blur(6px);}
      60%{opacity:1;filter:blur(0);}
      100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}
    }
    @keyframes backdropIn{
      from{opacity:0;backdrop-filter:blur(0);}
      to{opacity:1;backdrop-filter:blur(14px);}
    }
    @keyframes slideInLeft{
      from{opacity:0;transform:translateX(-16px);}
      to{opacity:1;transform:translateX(0);}
    }
    @keyframes pulse{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:1;transform:scale(1.05);}}
    @keyframes shimmer{
      0%{background-position:-200% 0;}
      100%{background-position:200% 0;}
    }
    @keyframes float{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-3px);}
    }
    @keyframes glow{
      0%,100%{box-shadow:0 0 20px rgba(200,184,128,.15);}
      50%{box-shadow:0 0 40px rgba(200,184,128,.35);}
    }

    /* Respeta preferencia de movimiento reducido sin ocultar contenido */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .01ms !important;
      }
      [style*="animation"], [style*="animation:"] {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
        filter: none !important;
      }
    }
  </style>

// ── Planet Visual ──────────────────────────────────────────
function PlanetVisual({ planet, pal, hov }) {
  const grad = PLANET_GRADIENTS[planet.world] || `radial-gradient(circle at 30% 30%, ${rgba(pal.c,1)} 0%, ${rgba(pal.c,.5)} 50%, rgba(0,0,0,.95) 100%)`;
  const size = 150;
  return (
    <div style={{width:'100%',height:'100%',background:`radial-gradient(ellipse at 50% 50%, ${pal.bg} 0%, rgba(2,3,8,1) 70%)`,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
      {/* Deep space twinkling stars */}
      {[...Array(60)].map((_,i)=>(
        <div key={i} style={{position:'absolute',left:`${(i*53)%100}%`,top:`${(i*41)%100}%`,width:i%6===0?2:1,height:i%6===0?2:1,borderRadius:'50%',background:'#fff',opacity:.4+(i%5)*.12,animation:`twinkle ${2+(i%4)}s ease-in-out ${i*.13}s infinite`}}/>
      ))}
      {/* Nebula */}
      <div style={{position:'absolute',inset:0,background:`radial-gradient(ellipse at 80% 20%, ${rgba(pal.c,.18)} 0%, transparent 40%), radial-gradient(ellipse at 15% 75%, ${rgba(pal.c,.1)} 0%, transparent 50%)`,opacity:.7,pointerEvents:'none'}}/>
      {/* Atmospheric outer glow */}
      <div style={{position:'absolute',width:size+90,height:size+90,borderRadius:'50%',background:`radial-gradient(circle, ${rgba(pal.c,.18)} 0%, transparent 60%)`,filter:'blur(20px)',animation:hov?'pulse 2.5s ease-in-out infinite':'none'}}/>
      {/* Orbit rings */}
      <div style={{position:'absolute',width:size+50,height:size+50,borderRadius:'50%',border:`1px dashed ${rgba(pal.c,.18)}`,animation:'spin 60s linear infinite'}}/>
      <div style={{position:'absolute',width:size+80,height:size+80,borderRadius:'50%',border:`1px solid ${rgba(pal.c,.08)}`,animation:'spinReverse 100s linear infinite'}}/>
      {/* Planet */}
      <div style={{
        position:'relative',width:size,height:size,borderRadius:'50%',
        background:grad,backgroundSize:'200% 100%',
        animation:'planetSpin 35s linear infinite',
        boxShadow:`0 0 70px ${rgba(pal.c,.45)}, inset -28px -22px 60px rgba(0,0,0,.85), inset 6px 6px 30px ${rgba(pal.c,.25)}`,
        zIndex:5,
        transform:hov?'scale(1.05)':'scale(1)',
        transition:'transform .7s cubic-bezier(.22,1,.36,1)',
      }}>
        {/* Highlight */}
        <div style={{position:'absolute',top:'12%',left:'18%',width:'35%',height:'30%',borderRadius:'50%',background:'radial-gradient(circle, rgba(255,255,255,.28) 0%, transparent 70%)',pointerEvents:'none',filter:'blur(4px)'}}/>
        {/* Atmosphere rim */}
        <div style={{position:'absolute',inset:-3,borderRadius:'50%',boxShadow:`inset 0 0 12px ${rgba(pal.c,.6)}, 0 0 24px ${rgba(pal.c,.35)}`,pointerEvents:'none'}}/>
        {/* Cloud belt for water worlds */}
        {(planet.world==='roshar'||planet.world==='nalthis'||planet.world==='sel') && (
          <div style={{position:'absolute',inset:0,borderRadius:'50%',background:'linear-gradient(180deg, transparent 35%, rgba(255,255,255,.12) 45%, transparent 55%, rgba(255,255,255,.08) 65%, transparent 75%)',mixBlendMode:'screen',animation:'planetSpin 50s linear infinite reverse',pointerEvents:'none'}}/>
        )}
        {/* Storm spot (Roshar) */}
        {planet.world==='roshar' && (
          <div style={{position:'absolute',top:'30%',left:'22%',width:14,height:14,borderRadius:'50%',background:'radial-gradient(circle, #fff, rgba(255,255,255,.2) 70%, transparent)',animation:'pulse 1.8s ease-in-out infinite',filter:'blur(.5px)'}}/>

        <div style={{position:'absolute',top:'50%',left:'50%',width:0,height:0,animation:'spin 18s linear infinite'}}>

// ── Modal ──────────────────────────────────────────────
function Modal({ modal, imgs, onClose }) {
  useEffect(()=>{
    if (!modal) return;
    const onKey = e => { if (e.key==='Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow='hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow=''; };
  },[modal,onClose]);
  if (!modal) return null;

  const { kind, item } = modal;
  let pal, img, title, kicker, subtitle;
  if (kind==='char') {
    pal = P[item.world]||{c:'#888',bg:'#050508'};
    img = imgs[ikey('personajes',item.id)];
    title = item.name; kicker = item.series; subtitle = item.role;
  } else if (kind==='book') {
    pal = P[item.world]||{c:'#888',bg:'#050508'};
    img = imgs[ikey('libros',item.id)];
    title = item.title; kicker = `${item.series} · ${item.year}`; subtitle = pal.name;
  } else if (kind==='planet') {
    pal = P[item.world]||{c:'#888',bg:'#050508'};
    img = imgs[ikey('mundos',item.id)];
    title = item.name; kicker = 'Sistema planetario'; subtitle = `Esquirla · ${item.shard}`;
  } else if (kind==='wh') {
    pal = { c: item.accent, bg:'#040408', name: item.origin };
    img = imgs[ikey('saltamundo',item.id)];
    title = item.name; kicker = 'Saltamundo'; subtitle = item.role;
  }

  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, zIndex:1000,
      background:'rgba(2,3,8,.86)', backdropFilter:'blur(14px)',
      display:'flex', alignItems:'center', justifyContent:'center',
      padding:'40px 24px', animation:'fadeIn .25s ease',
      overflowY:'auto',
    }}>
      <div onClick={e=>e.stopPropagation()} style={{
        position:'relative', width:'100%', maxWidth: 900,
        background:`linear-gradient(165deg,rgba(10,12,22,.98),${pal.bg})`,
        border:`1px solid ${rgba(pal.c,.35)}`,
        borderRadius:18, overflow:'hidden',
        boxShadow:`0 30px 80px rgba(0,0,0,.7), 0 0 60px ${rgba(pal.c,.18)}`,
        animation:'modalIn .32s cubic-bezier(.22,1,.36,1)',
      }}>
        <button onClick={onClose} style={{
          position:'absolute', top:14, right:14, zIndex:5,
          width:36, height:36, borderRadius:'50%',
          background:'rgba(0,0,0,.55)', border:`1px solid ${rgba(pal.c,.25)}`,
          color:rgba(pal.c,.9), fontSize:18, cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center',
          backdropFilter:'blur(8px)',
        }}>×</button>

        <div style={{display:'flex', flexDirection:'row', minHeight:320}}>
          <div style={{width:360, flexShrink:0, position:'relative', overflow:'hidden', background:pal.bg}}>
            {img
              ? <img src={img} alt={title} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'top',display:'block',minHeight:320}}/>
              : (

function ModalRow({ label, value, color }) {
  return (

}

    <article onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{
      background:`linear-gradient(160deg,rgba(8,10,20,.95),${pal.bg})`,

          width:38,height:38,borderRadius:9,
          background:active===s.id?'rgba(200,184,128,.1)':'none',
          border:active===s.id?'1px solid rgba(200,184,128,.3)':'1px solid transparent',
          color:active===s.id?'#c8b880':'#445566',
          cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',
          transition:'all .2s',
        }}>{s.icon}</button>
      ))}
      <div style={{flex:1}}/>
      <a href="Imagenes.html" title="Gestionar Imágenes" style={{
        width:38,height:38,borderRadius:9,
        border:'1px solid rgba(255,255,255,.08)',
        color:'#445566',display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:14,textDecoration:'none',transition:'all .2s',marginBottom:6,
      }}>⊕</a>
      <a href="Cosmere.html" title="Atlas" style={{
        width:38,height:38,borderRadius:9,
        border:'1px solid rgba(255,255,255,.08)',
        color:'#334455',display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:12,textDecoration:'none',transition:'all .2s',marginBottom:16,
      }}>↗</a>
    </div>
  );
}

// ── World filter row ──────────────────────────────────────
function WorldFilter({ worlds, active, onChange, allLabel='Todos' }) {
  return (
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:24}}>
      <FilterBtn label={allLabel} active={active==='all'} color='#c8b880' onClick={()=>onChange('all')}/>
      {worlds.map(w=>{
        const p=P[w]||{c:'#888',name:w};
        return <FilterBtn key={w} label={p.name} active={active===w} color={p.c} onClick={()=>onChange(w)}/>;
      })}
    </div>
  );
}
function FilterBtn({label,active,color,onClick}) {
  return (
    <button onClick={onClick} style={{
      background:active?rgba(color,.1):'rgba(255,255,255,.03)',
      border:`1px solid ${active?rgba(color,.35):'rgba(255,255,255,.08)'}`,
      color:active?color:'#445566',borderRadius:8,padding:'6px 13px',
      cursor:'pointer',fontSize:10,letterSpacing:'.06em',textTransform:'uppercase',
      fontFamily:"'DM Sans',sans-serif",transition:'all .2s',
    }}>{label}</button>
  );
}

// ── Search ────────────────────────────────────────────────
function Search({ value, onChange }) {
  return (
    <div style={{position:'relative',maxWidth:260,marginBottom:20}}>
      <input value={value} onChange={e=>onChange(e.target.value)}
        placeholder="Buscar..."
        style={{width:'100%',background:'rgba(8,10,20,.9)',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,padding:'8px 12px 8px 32px',color:'#e0d8c8',fontSize:11,fontFamily:"'DM Sans',sans-serif",outline:'none'}}/>
      <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#334455',fontSize:13}}>⌕</span>
    </div>
  );
}

// ── Section Header ─────────────────────────────────────────
function SectionHeader({ title, count }) {
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
      <div>
        <h2 style={{color:'#f0e8d8',fontSize:22,fontFamily:"'Cinzel',serif",fontWeight:700,letterSpacing:'.04em'}}>{title}</h2>
        <div style={{color:'#445566',fontSize:10,fontFamily:"'DM Sans',sans-serif",marginTop:3}}>{count} entradas</div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────
function App() {
  const [section,  setSection]  = useState('hoid');
  const [imgs,     setImgs]     = useState(loadImgs);
  const [wFilter,  setWFilter]  = useState('all');
  const [search,   setSearch]   = useState('');
  const [modal,    setModal]    = useState(null);

  // Re-read images when localStorage changes (from Imagenes.html)
  useEffect(()=>{
    const sync = () => setImgs(loadImgs());
    window.addEventListener('storage', sync);
    return () => window.removeEventListener('storage', sync);
  },[]);

  // Reset filters on section change
  useEffect(()=>{ setWFilter('all'); setSearch(''); },[section]);

  const filteredChars = useMemo(()=>CHARACTERS.filter(c=>{
    if(wFilter!=='all'&&c.world!==wFilter) return false;
    if(search&&!c.name.toLowerCase().includes(search.toLowerCase())&&!c.role.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[wFilter,search]);

  const filteredBooks = useMemo(()=>BOOKS.filter(b=>{
    if(wFilter!=='all'&&b.world!==wFilter) return false;
    if(search&&!b.title.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[wFilter,search]);

  const filteredPlanets = useMemo(()=>PLANETS.filter(p=>{
    if(search&&!p.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[search]);

  const sectionTitle = {hoid:'Hoid — El Eterno Viajero',noticias:'Noticias del Cosmere',personajes:'Personajes',libros:'Libros por Mundo',planetas:'Planetas y Sistemas',saltamundo:'Saltamundo'}[section];

  const charWorlds=[...new Set(CHARACTERS.map(c=>c.world))];
  const bookWorlds=[...new Set(BOOKS.map(b=>b.world))];

  return (
    <div style={{minHeight:'100vh',background:'#010306'}}>
      <Sidebar active={section} onSelect={setSection}/>

      <div style={{marginLeft:52}}>
        {/* Top bar */}
        <div style={{
          position:'sticky',top:0,zIndex:90,
          background:'rgba(1,3,6,.94)',backdropFilter:'blur(20px)',
          borderBottom:'1px solid rgba(255,255,255,.06)',
          padding:'0 32px',height:54,
          display:'flex',alignItems:'center',justifyContent:'space-between',
        }}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{color:'#334455',fontSize:9,letterSpacing:'.15em',textTransform:'uppercase',fontFamily:"'DM Sans',sans-serif"}}>Cosmere</span>
            <span style={{color:'#223344'}}>›</span>
            <h1 style={{color:'#c8b880',fontSize:14,fontFamily:"'Cinzel',serif",fontWeight:600,letterSpacing:'.05em'}}>{sectionTitle}</h1>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <a href="Imagenes.html" style={{color:'#c8b880',fontSize:10,letterSpacing:'.08em',textTransform:'uppercase',fontFamily:"'DM Sans',sans-serif",textDecoration:'none',background:'rgba(200,184,128,.08)',border:'1px solid rgba(200,184,128,.22)',borderRadius:6,padding:'5px 12px'}}>⊕ Imágenes</a>
            <a href="Guia.html"    style={{color:'#445566',fontSize:10,letterSpacing:'.08em',textTransform:'uppercase',fontFamily:"'DM Sans',sans-serif",textDecoration:'none'}}>Guía</a>
            <a href="Cosmere.html" style={{color:'#334455',fontSize:10,letterSpacing:'.08em',textTransform:'uppercase',fontFamily:"'DM Sans',sans-serif",textDecoration:'none'}}>↗ Atlas</a>
          </div>
        </div>

        {/* Content */}
        <div style={{padding:'28px 32px 80px'}}>

          {/* HOID */}
          {section==='hoid' && <HoidSection imgs={imgs}/>}

          {/* NOTICIAS */}
          {section==='noticias' && (
            <div>
              <SectionHeader title="Noticias del Cosmere" count={NEWS.length}/>
              <p style={{color:'#445566',fontSize:12,fontFamily:"'DM Sans',sans-serif",maxWidth:640,lineHeight:1.7,marginBottom:24}}>
                Últimas actualizaciones sobre los libros, eventos oficiales de Dragonsteel y revelaciones del universo de Brandon Sanderson.
              </p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}}>
                {NEWS.map((n,i)=>(
                  <NewsCard key={n.id} item={n} index={i} featured={i===0}/>
                ))}
              </div>
            </div>
          )}

          {/* PERSONAJES */}
          {section==='personajes' && (
            <div>
              <SectionHeader title="Personajes" count={filteredChars.length}/>
              <div style={{display:'flex',gap:12,alignItems:'flex-start',flexWrap:'wrap',marginBottom:16}}>
                <Search value={search} onChange={setSearch}/>
                <WorldFilter worlds={charWorlds} active={wFilter} onChange={setWFilter}/>
              </div>
              {filteredChars.length===0 && <Empty/>}
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:16}}>
                {filteredChars.map((c,i)=>(
                  <CharCard key={c.id} char={c} img={imgs[ikey('personajes',c.id)]} onOpen={()=>setModal({kind:'char',item:c})} index={i}/>
                ))}
              </div>
            </div>
          )}

          {/* LIBROS */}
          {section==='libros' && (
            <div>
              <SectionHeader title="Libros" count={filteredBooks.length}/>
              <div style={{display:'flex',gap:12,alignItems:'flex-start',flexWrap:'wrap',marginBottom:16}}>
                <Search value={search} onChange={setSearch}/>
                <WorldFilter worlds={bookWorlds} active={wFilter} onChange={setWFilter}/>
              </div>
              {filteredBooks.length===0 && <Empty/>}
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:16}}>
                {filteredBooks.map((b,i)=>(
                  <BookCard key={b.id} book={b} img={imgs[ikey('libros',b.id)]} onOpen={()=>setModal({kind:'book',item:b})} index={i}/>
                ))}
              </div>
            </div>
          )}

          {/* PLANETAS */}
          {section==='planetas' && (
            <div>
              <SectionHeader title="Planetas y Sistemas" count={filteredPlanets.length}/>
              <Search value={search} onChange={setSearch}/>
              {filteredPlanets.length===0 && <Empty/>}
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:20}}>
                {filteredPlanets.map((p,i)=>(
                  <PlanetCard key={p.id} planet={p} img={imgs[ikey('mundos',p.id)]} onOpen={()=>setModal({kind:'planet',item:p})} index={i}/>
                ))}
              </div>
            </div>
          )}

          {/* SALTAMUNDO */}
          {section==='saltamundo' && (
            <div>
              <SectionHeader title="Saltamundo" count={WORLDHOPPERS.length}/>
              <p style={{color:'#445566',fontSize:12,fontFamily:"'DM Sans',sans-serif",maxWidth:600,lineHeight:1.7,marginBottom:24}}>
                Los Saltamundo descubrieron cómo cruzar el Reino Cognitivo entre mundos del Cosmere. Son raros, peligrosos, y casi todos ocultan secretos que podrían reescribir la historia.
              </p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:20}}>
                {WORLDHOPPERS.map((wh,i)=>(
                  <WHCard key={wh.id} wh={wh} img={imgs[ikey('saltamundo',wh.id)]} onOpen={()=>setModal({kind:'wh',item:wh})} index={i}/>
                ))}
              </div>
            </div>
          )}

        </div>
      </div>
      <Modal modal={modal} imgs={imgs} onClose={()=>setModal(null)}/>
    </div>
  );
}

function Empty() {
  return <div style={{textAlign:'center',padding:'60px 0',color:'#334455',fontFamily:"'DM Sans',sans-serif",fontSize:13}}>Sin resultados.</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
